name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g., latest or v1.2.3). Leave blank to release from the selected branch.'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  ARCHIVE_NAME: "pk-exp"
  RELEASE_NAME: "PK Extra Plus"

permissions:
  contents: read

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set tag name
        id: set_tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG_NAME="$GITHUB_REF_NAME"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            TAG_NAME="latest"
          else
            TAG_NAME="dev"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set archive prefix and name
        id: archive_prefix
        env:
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            PREFIX="$INPUT_TAG"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            PREFIX="$GITHUB_REF_NAME"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            PREFIX="latest"
          else
            PREFIX="dev"
          fi
          ARCHIVE_NAME="${{ env.ARCHIVE_NAME }}-${PREFIX}.zip"
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT

      - name: Build with custom Docker image
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/t3r6/paintools:main
          options: -v ${{ github.workspace }}:/workspace --entrypoint sh -u root
          run: |
            TEMP_FOLDER="/data"
            WORKSPACE_FOLDER="workspace"
            cp -r /workspace/ "${TEMP_FOLDER}"
            rm -rf ${TEMP_FOLDER}/${WORKSPACE_FOLDER}/.git/ ${TEMP_FOLDER}/${WORKSPACE_FOLDER}/.github/ ${TEMP_FOLDER}/${WORKSPACE_FOLDER}/*README* ${TEMP_FOLDER}/${WORKSPACE_FOLDER}/*script
            PainTools_x64 -level 1 -deduplication 0 ${WORKSPACE_FOLDER}/
            mv ${WORKSPACE_FOLDER}.pak /${WORKSPACE_FOLDER}/PKPlus.pak

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pk-extra-plus
          path: PKPlus.pak

      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          path: PKPlus.pak
          filename: ${{ steps.archive_prefix.outputs.archive_name }}
          exclusions: '*.git*'

      - name: Delete existing release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.set_tag.outputs.tag_name }}
        run: |
          gh release delete "$TAG_NAME" --yes --cleanup-tag || true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.set_tag.outputs.tag_name }}
          name: ${{ steps.set_tag.outputs.tag_name == 'latest' && format('{0} latest', env.RELEASE_NAME) || format('{0} {1}', env.RELEASE_NAME, steps.set_tag.outputs.tag_name) }}
          files: ${{ steps.archive_prefix.outputs.archive_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}